<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SquadUp — Random Gamer Chat</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Username / entry screen -->
  <div id="entry-screen" class="screen">
    <div class="entry-card">
      <h1>SquadUp<span class="dot">.</span></h1>
      <p class="tagline">Find your next teammate. No account needed.</p>
      <input id="username-input" type="text" placeholder="Pick a name" maxlength="24" autocomplete="off" />
      <button id="start-btn">Find a match</button>
      <p class="hint">Guest mode — jump straight in.</p>
    </div>
  </div>

  <!-- Main chat screen -->
  <div id="chat-screen" class="screen hidden">
    <header class="topbar">
      <div class="brand">SquadUp<span class="dot">.</span></div>
      <div id="status" class="status">Connecting…</div>
      <div class="controls">
        <button id="toggle-cam-btn" title="Toggle camera">Cam: On</button>
        <button id="toggle-mic-btn" title="Toggle mic">Mic: On</button>
        <button id="next-btn" class="next-btn">Next ⏭</button>
      </div>
    </header>

    <main class="stage">
      <div class="video-pane">
        <video id="remote-video" autoplay playsinline></video>
        <div id="remote-label" class="video-label">Waiting for someone…</div>
        <video id="local-video" autoplay playsinline muted class="local-preview"></video>
      </div>

      <aside class="chat-pane">
        <div id="chat-log" class="chat-log"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" placeholder="Say something…" autocomplete="off" maxlength="500" />
          <button type="submit">Send</button>
        </form>
      </aside>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
